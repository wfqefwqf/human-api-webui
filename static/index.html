<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human API Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mdui@2/mdui.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<mdui-layout full-height>

    <mdui-top-app-bar>
        <mdui-top-app-bar-title style="display:flex;align-items:center;gap:8px;">
            Human API Console
            <span class="ws-dot" id="ws-dot" title="连接中"></span>
        </mdui-top-app-bar-title>
    </mdui-top-app-bar>

    <mdui-layout-main class="main-content">

        <div class="layout-sidebar">
            <mdui-card class="sidebar-card">
                <div class="sidebar-header">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span class="sidebar-title">会话</span>
                        <span class="sidebar-stats" id="sidebar-stats">0 / 0</span>
                    </div>
                    <mdui-button-icon id="btn-refresh" icon="refresh--outlined" title="刷新列表"></mdui-button-icon>
                </div>
                <div class="sidebar-filter">
                    <mdui-segmented-button-group id="filter-group" selects="single" value="all" full-width>
                        <mdui-segmented-button value="all">全部</mdui-segmented-button>
                        <mdui-segmented-button value="waiting">等待中</mdui-segmented-button>
                        <mdui-segmented-button value="replied">已回复</mdui-segmented-button>
                    </mdui-segmented-button-group>
                </div>
                <div class="session-list" id="session-list">
                    <div class="empty-state">
                        <mdui-icon name="chat--outlined" style="font-size:48px;opacity:0.3;"></mdui-icon>
                        <div>暂无会话，等待外部请求...</div>
                    </div>
                </div>
            </mdui-card>
        </div>

        <div class="layout-chat">
            <mdui-card class="chat-card">
                <div class="chat-empty" id="chat-empty">
                    <mdui-icon name="forum--outlined" style="font-size:72px;opacity:0.15;"></mdui-icon>
                    <p>选择左侧会话查看消息</p>
                    <p class="chat-empty-sub">或等待新的 API 请求进入</p>
                </div>
                <div class="chat-active" id="chat-active" style="display:none;">
                    <div class="chat-header">
                        <div class="chat-header-info">
                            <mdui-chip id="chat-session-id" icon="tag--outlined"></mdui-chip>
                            <mdui-chip id="chat-status"></mdui-chip>
                            <mdui-chip id="chat-model" icon="smart_toy--outlined"></mdui-chip>
                            <span class="chat-time" id="chat-time"></span>
                        </div>
                    </div>
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="reply-area" id="reply-area">
                        <mdui-text-field
                            id="reply-input"
                            label="回复内容"
                            placeholder="Ctrl+Enter 发送"
                            rows="3"
                            max-rows="8"
                            variant="outlined"
                            autosize
                        ></mdui-text-field>
                        <div class="reply-actions">
                            <span class="reply-hint" id="reply-hint">回复将以 AI 身份返回给调用方</span>
                            <mdui-button id="btn-ai-reply" variant="outlined" icon="smart_toy--outlined">AI 回复</mdui-button>
                            <mdui-button id="btn-send-reply" icon="send--outlined">发送</mdui-button>
                        </div>
                    </div>
                </div>
            </mdui-card>
        </div>

        <div class="layout-settings">
            <mdui-card class="settings-card">
                <div class="settings-scroll">
                    <div class="settings-section-title">设置</div>

                    <mdui-text-field id="setting-api-key" label="API 访问密钥" placeholder="留空则不鉴权" variant="outlined"></mdui-text-field>
                    <mdui-text-field id="setting-timeout" label="回复超时时间（秒）" type="number" value="120" variant="outlined"></mdui-text-field>
                    <mdui-text-field id="setting-timeout-reply" label="超时默认回复" placeholder="超时后自动返回的回复内容" rows="2" variant="outlined"></mdui-text-field>
                    <mdui-button id="btn-save-config" variant="tonal" full-width>保存设置</mdui-button>

                    <mdui-divider></mdui-divider>

                    <div class="settings-section-title">
                        <mdui-icon name="smart_toy--outlined" style="font-size:18px;vertical-align:middle;margin-right:6px;"></mdui-icon>AI 自动回复
                    </div>
                    <div class="setting-row">
                        <span>启用 AI 自动回复</span>
                        <mdui-switch id="setting-ai-enabled"></mdui-switch>
                    </div>
                    <div class="setting-row">
                        <span>AI 自动托管</span>
                        <mdui-switch id="setting-ai-auto-host"></mdui-switch>
                    </div>
                    <mdui-text-field id="setting-ai-api-url" label="AI API 地址" placeholder="https://api.openai.com/v1/chat/completions" variant="outlined"></mdui-text-field>
                    <mdui-text-field id="setting-ai-api-key" label="AI API 密钥" type="password" placeholder="sk-..." variant="outlined" toggle-password></mdui-text-field>
                    <mdui-text-field id="setting-ai-model" label="AI 模型名称" placeholder="gpt-4o" variant="outlined"></mdui-text-field>
                    <mdui-text-field id="setting-ai-system-prompt" label="AI 系统提示词" placeholder="你是一个有帮助的AI助手。" rows="2" variant="outlined"></mdui-text-field>
                    <mdui-button id="btn-save-ai-config" variant="tonal" full-width>保存 AI 设置</mdui-button>

                    <mdui-divider></mdui-divider>

                    <div class="settings-section-title">
                        <mdui-icon name="favorite--outlined" style="font-size:18px;vertical-align:middle;margin-right:6px;"></mdui-icon>心跳自动回复
                    </div>
                    <div class="setting-row">
                        <span>启用心跳自动回复</span>
                        <mdui-switch id="setting-heartbeat-enabled"></mdui-switch>
                    </div>
                    <mdui-text-field id="setting-heartbeat-patterns" label="心跳关键词" placeholder="hi, hello, ping, test" variant="outlined"></mdui-text-field>
                    <mdui-button id="btn-save-heartbeat-config" variant="tonal" full-width>保存心跳设置</mdui-button>

                    <mdui-divider></mdui-divider>

                    <mdui-button id="btn-clear-all" variant="outlined" icon="delete_forever--outlined" full-width class="btn-danger">清空所有会话历史</mdui-button>

                    <mdui-divider></mdui-divider>

                    <div class="info-block">
                        <div class="info-label">API 端点</div>
                        <code>/v1/chat/completions</code>
                        <div class="info-label">兼容端点</div>
                        <code>/api/chat</code>
                    </div>
                </div>
            </mdui-card>
        </div>

    </mdui-layout-main>

</mdui-layout>

<script src="https://cdn.jsdelivr.net/npm/mdui@2/mdui.global.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
